# Helpdesk Workflow Worker
# Workflow execution via CF Workflows + assignment routing via DO + SLA cron.

name = "helpdesk-workflow-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# ============ CF WORKFLOWS ============

[[workflows]]
name = "conversation-workflow"
binding = "CONVERSATION_WORKFLOW"
class_name = "ConversationWorkflow"

# ============ DURABLE OBJECTS ============

[durable_objects]
bindings = [
  { name = "ASSIGNMENT_ROUTER", class_name = "AssignmentRouter" },
]

[[migrations]]
tag = "v1"
new_classes = ["ConversationOrchestrator", "AssignmentRouter"]

[[migrations]]
tag = "v2"
deleted_classes = ["ConversationOrchestrator"]

# ============ LOCAL DEVELOPMENT ============

[vars]
ENVIRONMENT = "development"

[triggers]
crons = []

[[hyperdrive]]
binding = "HYPERDRIVE_MASTER"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"
localConnectionString = "postgresql://postgres:__LOCAL_DEV_PASSWORD__@localhost:5432/weldsuite_master?sslmode=require"

[[kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[services]]
binding = "REALTIME"
service = "weldsuite-realtime"

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "helpdesk-workflow-worker"
routes = [
  { pattern = "helpdesk-workflow-worker.weldsuite.org", custom_domain = true }
]

[env.production.durable_objects]
bindings = [
  { name = "ASSIGNMENT_ROUTER", class_name = "AssignmentRouter" },
]

[env.production.triggers]
crons = []

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.hyperdrive]]
binding = "HYPERDRIVE_MASTER"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.workflows]]
name = "conversation-workflow"
binding = "CONVERSATION_WORKFLOW"
class_name = "ConversationWorkflow"

[[env.production.services]]
binding = "REALTIME"
service = "weldsuite-realtime-production"

[env.production.observability]
enabled = true
head_sampling_rate = 1
