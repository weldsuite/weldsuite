# WeldSuite Mail Inbound Worker
# Handles inbound emails via Cloudflare Email Routing (the `email` handler).
# All domains (weldmail.com + custom domains) route through Cloudflare.

name = "weldsuite-mail-inbound"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# Required secrets (add via wrangler secret put):
# - BETTERSTACK_TOKEN: Better Stack source token (from Better Stack > Sources)

[vars]
ENVIRONMENT = "development"
R2_PUBLIC_URL = "https://weldsuite-storage-test.weldsuite.org"

# KV namespace for workspace URL caching (create via: wrangler kv namespace create WORKSPACE_CACHE)
[[kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

# R2 storage for mail attachments
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "weldsuite-storage"

[[services]]
binding = "REALTIME"
service = "weldsuite-realtime"

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "weldsuite-mail-inbound"
routes = [
  { pattern = "mail-inbound.weldsuite.org", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
R2_PUBLIC_URL = "https://weldsuite-storage.weldsuite.org"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "weldsuite-storage"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.services]]
binding = "REALTIME"
service = "weldsuite-realtime-production"

[env.production.observability]
enabled = true
head_sampling_rate = 1
