# WeldSuite Audit Log Worker
# Dedicated queue consumer for AUDIT_EVENTS — writes audit logs to tenant databases.

name = "weldsuite-audit-log"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# ============ LOCAL DEVELOPMENT ============
# Required secrets (add via wrangler secret put):
# - DATABASE_URL_MASTER: Neon master database connection string
# - NEON_API_KEY: Neon database API key
# - DATABASE_ENCRYPTION_KEY: 64-char hex key for AES-256-GCM encryption (optional)

[vars]
ENVIRONMENT = "development"

# KV namespace for workspace URL caching (shared with api-worker)
[[kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

# Queue: this worker consumes audit events
[[queues.consumers]]
queue = "audit-events-dev"
max_batch_size = 10
max_batch_timeout = 1

# ============ TEST ENVIRONMENT ============
[env.test]
name = "weldsuite-audit-log-test"

[env.test.vars]
ENVIRONMENT = "test"

[[env.test.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.test.queues.consumers]]
queue = "audit-events-test"
max_batch_size = 10
max_batch_timeout = 1

# ============ PREVIEW ENVIRONMENT ============
[env.preview]
name = "weldsuite-audit-log-preview"

[env.preview.vars]
ENVIRONMENT = "preview"

[[env.preview.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.preview.queues.consumers]]
queue = "audit-events-preview"
max_batch_size = 10
max_batch_timeout = 1

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "weldsuite-audit-log"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.queues.consumers]]
queue = "audit-events"
max_batch_size = 10
max_batch_timeout = 1

# --- Persist Workers Logs across environments ---
# observability is NOT inherited by named environments, so it must be set on each.
[env.test.observability]
enabled = true
head_sampling_rate = 1

[env.preview.observability]
enabled = true
head_sampling_rate = 1

[env.production.observability]
enabled = true
head_sampling_rate = 1
