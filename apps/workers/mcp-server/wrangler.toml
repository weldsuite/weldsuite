# MCP Server - Customer-facing MCP protocol endpoint
# Allows WeldSuite customers to access their data through AI assistants
name = "weldsuite-mcp-server"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Default (used by `wrangler dev`) — tools proxy to the external API.
[vars]
EXTERNAL_API_BASE_URL = "https://api-test.weldsuite.org"

# Service binding to the External API worker. Tool calls are proxied over this
# binding instead of the public hostname so the subrequest bypasses the
# Cloudflare edge — same-zone Worker→Worker calls over a public hostname fail
# with HTTP 530. Service bindings are NOT inherited by named environments, so
# this is repeated in each [env.*] block below.
[[services]]
binding = "EXTERNAL_API"
service = "weldsuite-external-api-test"

# Shims to prevent bundling Node.js-only packages from @weldsuite/db
[alias]
"@clerk/nextjs/server" = "./src/lib/clerk-shim.ts"
"@clerk/nextjs" = "./src/lib/clerk-shim.ts"
"next/server" = "./src/lib/next-shim.ts"
"react" = "./src/lib/react-shim.ts"

# Durable Objects for distributed rate limiting
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
name = "weldsuite-mcp-server"
routes = [{ pattern = "mcp.weldsuite.org/*", zone_name = "weldsuite.org" }]
vars = { ENVIRONMENT = "production", EXTERNAL_API_BASE_URL = "https://api.weldsuite.org" }

[[env.production.services]]
binding = "EXTERNAL_API"
service = "weldsuite-external-api"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# Share KV namespace with external-api for cache coherence
[[env.production.kv_namespaces]]
binding = "API_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

# Inheritable key — applies to all named environments unless overridden.
[observability]
enabled = true
head_sampling_rate = 1

[env.production.observability]
enabled = true
head_sampling_rate = 1
