class_name = "ExecuteWorkflowWorkflow"
script_name = "weldsuite-workflow-test"

# CRM sequence execution — hosted in this worker (app-api), no script_name.
# New name (W4): the old `execute-sequence-test` stays owned by api-worker
# while its in-flight instances drain.
[[env.test.workflows]]
name = "execute-sequence-v2-test"
binding = "EXECUTE_SEQUENCE"
class_name = "ExecuteSequenceWorkflow"

# Trash purge — hosted in this worker (app-api), no script_name. New name
# (W4): api-worker's `trash-cleanup-test` keeps draining (30-day sleeps).
[[env.test.workflows]]
name = "trash-cleanup-v2-test"
binding = "TRASH_CLEANUP"
class_name = "TrashCleanupWorkflow"

# Scheduled email — hosted in this worker (app-api), no script_name.
# New name: the old `send-scheduled-email-test` is still owned by api-worker
# while its in-flight instances drain (max 7 days, MAX_SCHEDULE_DAYS).
[[env.test.workflows]]
name = "send-scheduled-email-v2-test"
binding = "SEND_SCHEDULED_EMAIL"
class_name = "SendScheduledEmailWorkflow"

# Transcription workflow — dispatched by POST /api/meetings/:id/recording/transcribe.
# Hosted in this worker (W4); requires the ASSEMBLYAI_API_KEY secret.
[[env.test.workflows]]
name = "transcribe-recording-v2-test"
binding = "TRANSCRIBE_RECORDING"
class_name = "TranscribeRecordingWorkflow"

# Chat pin auto-expiry — hosted in this worker (W4); dispatched by the
