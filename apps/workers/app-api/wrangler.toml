name = "crm-sync-int-preview"
binding = "CRM_SYNC"
class_name = "CrmSyncWorkflow"
script_name = "weldsuite-integration-webhooks-preview"

# WeldData enrichment — hosted in this worker (app-api), no script_name.
[[env.preview.workflows]]
name = "welddata-enrich-preview"
binding = "WELDDATA_ENRICH"
class_name = "WelddataEnrichWorkflow"

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "weldsuite-app-api"
routes = [
  { pattern = "app-api.weldsuite.org", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
DIGIPOORT_MODE = "simulated"
NEON_DEFAULT_REGION = "aws-eu-central-1"
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
R2_PUBLIC_URL = "https://weldsuite-storage.weldsuite.org"
WORKSPACE_WORKER_URL = "https://workspace-worker.weldsuite.org"
HELPDESK_WORKFLOW_WORKER_URL = "https://helpdesk-workflow-worker.weldsuite.org"

# Cloudflare Flagship feature-flag binding.
# app id from the dashboard, and create each flag (e.g. `upgrade-button`) there.
[[env.production.flagship]]
binding = "FLAGSHIP"
app_id = "REPLACE_WITH_FLAGSHIP_APP_ID"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.d1_databases]]
binding = "SCHEDULE_INDEX"
database_name = "weldsuite-schedule-index-production"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

[[env.production.queues.producers]]
binding = "AUDIT_EVENTS"
queue = "audit-events"

[[env.production.queues.producers]]
binding = "WORKFLOW_EVENTS"
queue = "workflow-events"

[[env.production.queues.producers]]
binding = "ANALYTICS_EVENTS"
queue = "analytics-events"

[[env.production.services]]
binding = "REALTIME"
service = "weldsuite-realtime-production"

# Production workspace-worker deploys under the base name "weldsuite-workspace"
# (its wrangler [env.production] name), NOT a "-production" suffix.
[[env.production.services]]
binding = "WORKSPACE_WORKER"
service = "weldsuite-workspace"
entrypoint = "WorkspaceOnboardEntrypoint"

[[env.production.send_email]]
name = "SEND_EMAIL"

[[env.production.workflows]]
name = "execute-workflow"
binding = "EXECUTE_WORKFLOW"
class_name = "ExecuteWorkflowWorkflow"
script_name = "weldsuite-workflow"

# CRM sequence execution — hosted in this worker (app-api), no script_name.
# New name (W4): the old `execute-sequence` stays owned by api-worker while
# its in-flight instances drain.
[[env.production.workflows]]
name = "execute-sequence-v2"
binding = "EXECUTE_SEQUENCE"
class_name = "ExecuteSequenceWorkflow"

# Trash purge — hosted in this worker (app-api), no script_name. New name
# (W4): api-worker's `trash-cleanup` keeps draining (30-day sleeps).
[[env.production.workflows]]
name = "trash-cleanup-v2"
binding = "TRASH_CLEANUP"
class_name = "TrashCleanupWorkflow"

# Scheduled email — hosted in this worker (app-api), no script_name.
# New name: the old `send-scheduled-email` is still owned by api-worker while
# its in-flight instances drain (max 7 days, MAX_SCHEDULE_DAYS).
[[env.production.workflows]]
name = "send-scheduled-email-v2"
binding = "SEND_SCHEDULED_EMAIL"
class_name = "SendScheduledEmailWorkflow"

# Transcription workflow — hosted in this worker (W4); needs ASSEMBLYAI_API_KEY.
[[env.production.workflows]]
name = "transcribe-recording-v2"
binding = "TRANSCRIBE_RECORDING"
class_name = "TranscribeRecordingWorkflow"

# Chat pin auto-expiry — hosted in this worker (W4).
[[env.production.workflows]]
name = "unpin-expired-message-v2"
binding = "UNPIN_EXPIRED_MESSAGE"
class_name = "UnpinExpiredMessageWorkflow"

# Daily task digest — hosted in this worker (W4).
[[env.production.workflows]]
name = "send-digest-v2"
binding = "SEND_DIGEST"
class_name = "SendDigestWorkflow"

# Bulk task import — hosted in this worker (W4).
[[env.production.workflows]]
name = "import-tasks-v2"
binding = "IMPORT_TASKS"
class_name = "ImportTasksWorkflow"

# Cron sweeps re-hosted from api-worker (dashboard-configured there; delete
# api-worker's dashboard crons "0 * * * *" and "0 4 * * *" after this deploys
# so digests aren't sent twice — W7 ops).
[env.production.triggers]
crons = ["0 * * * *", "0 4 * * *"]

# GitHub sync workflows — classes hosted in integration-webhook-worker (weldsuite-integration-webhooks).
[[env.production.workflows]]
name = "github-project-sync-int"
binding = "GITHUB_PROJECT_SYNC"
class_name = "GithubProjectSyncWorkflow"
script_name = "weldsuite-integration-webhooks"

[[env.production.workflows]]
name = "github-project-outbound-int"
binding = "GITHUB_PROJECT_OUTBOUND"
class_name = "GithubProjectOutboundSyncWorkflow"
script_name = "weldsuite-integration-webhooks"

# CRM sync engine — CrmSyncWorkflow hosted by integration-webhook-worker.
[[env.production.workflows]]
name = "crm-sync-int"
binding = "CRM_SYNC"
class_name = "CrmSyncWorkflow"
script_name = "weldsuite-integration-webhooks"

# WeldData enrichment — hosted in this worker (app-api), no script_name.
[[env.production.workflows]]
name = "welddata-enrich"
binding = "WELDDATA_ENRICH"
class_name = "WelddataEnrichWorkflow"

# --- Persist Workers Logs across environments ---
# observability is NOT inherited by named environments, so it must be set on each.
[env.test.observability]
enabled = true
head_sampling_rate = 1

[env.preview.observability]
enabled = true
head_sampling_rate = 1

[env.production.observability]
enabled = true
head_sampling_rate = 1
