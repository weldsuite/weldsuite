[[env.test.workflows]]
name = "unpin-expired-message-v2-test"
binding = "UNPIN_EXPIRED_MESSAGE"
class_name = "UnpinExpiredMessageWorkflow"

# Daily task digest — hosted in this worker (W4); dispatched by the hourly
