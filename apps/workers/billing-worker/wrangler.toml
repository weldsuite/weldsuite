# WeldSuite Billing Worker
# Handles Stripe billing: webhooks, checkout, seat management, invoices

name = "weldsuite-billing"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# ============ LOCAL DEVELOPMENT ============
# Required secrets (add via wrangler secret put):
# - STRIPE_SECRET_KEY: Stripe secret key (sk_...)
# - STRIPE_BILLING_WEBHOOK_SECRET: Stripe billing webhook signing secret (whsec_...)
# - CLERK_JWT_KEY: Clerk JWT public key (PEM format)
# - CLERK_SECRET_KEY: Clerk secret key
# - CLERK_MACHINE_SECRET_KEY: Clerk M2M machine secret key (ak_...)
# - NEON_API_KEY: Neon database API key
# - DATABASE_ENCRYPTION_KEY: 64-char hex key for AES-256-GCM encryption
# - BETTERSTACK_TOKEN: Better Stack source token (from Better Stack > Sources)

[vars]
ENVIRONMENT = "development"

[[hyperdrive]]
binding = "HYPERDRIVE_MASTER"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"
localConnectionString = "postgresql://postgres:__LOCAL_DEV_PASSWORD__@localhost:5432/weldsuite_master?sslmode=require"

[[kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "weldsuite-billing"
routes = [
  { pattern = "billing-worker.weldsuite.org", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.hyperdrive]]
binding = "HYPERDRIVE_MASTER"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[env.production.observability]
enabled = true
head_sampling_rate = 1
