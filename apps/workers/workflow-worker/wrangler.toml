# WeldConnect workflow execution worker.
#
# Runtime home of the WeldConnect automation engine: the Cloudflare Workflow
# `ExecuteWorkflowWorkflow` plus the engine under src/engine/. app-api,
# helpdesk-workflow-worker, and entity-events start a run via the
# EXECUTE_WORKFLOW binding's `create({ params })` (script_name → this worker).
#
# Also hosts the workflow schedule sweep (src/cron/schedule-sweep.ts): a
# per-minute Cron Trigger (see [triggers] below, every env). Rather than fanning
# out to every tenant Neon DB each tick, it polls the always-on D1 schedule
# index (SCHEDULE_INDEX binding below) and opens a tenant DB only when a schedule
# actually fires, so idle workspaces' databases autosuspend. Due schedules are
# dispatched via this worker's OWN EXECUTE_WORKFLOW self-binding. app-api keeps
# the index in sync on schedule CRUD; POST /internal/schedule-index/rebuild
# (bearer INTERNAL_API_SECRET) backfills it once from existing tenant schedules.
#
# Required secrets (wrangler secret put, per env):
#   DATABASE_URL_MASTER      — master Neon connection string (workspace lookup +
#                              schedule sweep's workspace listing + ai_generate/
#                              ai_classify credit-wallet metering)
#   NEON_API_KEY             — resolves per-tenant Neon connection URLs
#   DATABASE_ENCRYPTION_KEY  — (optional) decrypts stored tenant URLs
#   INTERNAL_API_SECRET      — bearer for app-api's /api/internal/send-email endpoint
#                              (must MATCH app-api's INTERNAL_API_SECRET per env)
#   TELNYX_API_KEY           — (optional) send_sms
#   AI (ai_generate / ai_classify, via @weldsuite/ai) — the Cloudflare AI Gateway.
#                              Model ids and pricing are canonical. Set:
#   AI_GATEWAY_API_TOKEN     — CF API token with Workers AI + AI Gateway Run
#                              scopes, sent as Authorization. Covers both Workers AI
#                              (@cf/… — free allocation) and third-party models (unified
#                              billing). `wrangler secret put AI_GATEWAY_API_TOKEN`.
#                              CF_ACCOUNT_ID is already a [vars] value below (mirrors
#                              apps/workers/app-api/wrangler.toml). Optionally CF_AI_GATEWAY (a
#                              named gateway id; omit for the account default) +
#                              CF_AIG_TOKEN (authenticated gateways only).
#   AI_DEFAULT_MODEL         — ([vars], optional) overrides the default model.
#
# Per-env KV ids + queue/service names mirror api-worker; fill the REPLACE_ME
# ids before deploying each environment.

name = "weldsuite-workflow"
main = "src/index.ts"
compatibility_date = "2025-01-10"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "development"
# Origin of app-api (POST /api/internal/send-email, used by the send_email
# action with bearer INTERNAL_API_SECRET). Repointed from the legacy
# api-worker in phase W3 of the legacy-worker phase-out plan
# (.claude/open-source-plan.md). Local `wrangler dev` serves app-api on 8789.
APP_API_URL = "http://localhost:8789"
# @weldsuite/ai → Cloudflare AI Gateway (ai_generate / ai_classify actions).
# Mirrors apps/workers/app-api/wrangler.toml's CF_ACCOUNT_ID value.
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[[kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

# D1 schedule index — local `wrangler dev` emulates this against a local SQLite
# copy; the id points at the test database so remote-mode dev shares it.
[[d1_databases]]
binding = "SCHEDULE_INDEX"
database_name = "weldsuite-schedule-index-test"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[services]]
binding = "REALTIME"
service = "weldsuite-realtime"

[[workflows]]
name = "execute-workflow-dev"
binding = "EXECUTE_WORKFLOW"
class_name = "ExecuteWorkflowWorkflow"

[triggers]
# Workflow schedule sweep — matches enabled workflow_schedules against their
# cron expression + timezone and dispatches due ones every minute (see
# src/cron/schedule-sweep.ts and the `scheduled` handler in src/index.ts).
crons = ["* * * * *"]

# ============ TEST ============
[env.test]
name = "weldsuite-workflow-test"

[env.test.vars]
ENVIRONMENT = "test"
APP_API_URL = "https://app-api-test.weldsuite.org"
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[[env.test.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.test.d1_databases]]
binding = "SCHEDULE_INDEX"
database_name = "weldsuite-schedule-index-test"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[env.test.services]]
binding = "REALTIME"
service = "weldsuite-realtime-test"

[[env.test.workflows]]
name = "execute-workflow-test"
binding = "EXECUTE_WORKFLOW"
class_name = "ExecuteWorkflowWorkflow"

[env.test.triggers]
crons = ["* * * * *"]

# ============ PREVIEW ============
[env.preview]
name = "weldsuite-workflow-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
# app-api has no preview custom domain, so preview borrows the TEST app-api —
# the same pattern the legacy api-worker's own [env.preview.vars] used for
# WORKSPACE_WORKER_URL. This worker's preview INTERNAL_API_SECRET must
# therefore match the TEST app-api's secret for /api/internal/send-email to
# authenticate.
APP_API_URL = "https://app-api-test.weldsuite.org"
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[[env.preview.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.preview.d1_databases]]
binding = "SCHEDULE_INDEX"
database_name = "weldsuite-schedule-index-preview"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[env.preview.services]]
binding = "REALTIME"
service = "weldsuite-realtime-preview"

[[env.preview.workflows]]
name = "execute-workflow-preview"
binding = "EXECUTE_WORKFLOW"
class_name = "ExecuteWorkflowWorkflow"

[env.preview.triggers]
crons = ["* * * * *"]

# ============ PRODUCTION ============
[env.production]
name = "weldsuite-workflow"

[env.production.vars]
ENVIRONMENT = "production"
APP_API_URL = "https://app-api.weldsuite.org"
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.d1_databases]]
binding = "SCHEDULE_INDEX"
database_name = "weldsuite-schedule-index-production"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[env.production.services]]
binding = "REALTIME"
service = "weldsuite-realtime-production"

[[env.production.workflows]]
name = "execute-workflow"
binding = "EXECUTE_WORKFLOW"
class_name = "ExecuteWorkflowWorkflow"

[env.production.triggers]
crons = ["* * * * *"]

# --- Persist Workers Logs across environments ---
# observability is NOT inherited by named environments, so it must be set on each.
[env.test.observability]
enabled = true
head_sampling_rate = 1

[env.preview.observability]
enabled = true
head_sampling_rate = 1

[env.production.observability]
enabled = true
head_sampling_rate = 1
