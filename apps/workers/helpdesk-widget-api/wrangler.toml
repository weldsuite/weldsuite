# ============ PRODUCTION ENVIRONMENT ============
[env.production]
logpush = true
name = "helpdesk-widget-api"
routes = [
  { pattern = "helpdesk-widget-api.weldsuite.org", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
R2_PUBLIC_URL = "https://weldsuite-storage.weldsuite.org"
CF_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"


[[env.production.hyperdrive]]
binding = "HYPERDRIVE_MASTER"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.kv_namespaces]]
binding = "WORKSPACE_CACHE"
id = "REPLACE_WITH_KV_OR_HYPERDRIVE_ID"

[[env.production.queues.producers]]
binding = "ENTITY_EVENTS"
queue = "entity-events"

[[env.production.queues.producers]]
binding = "ANALYTICS_EVENTS"
queue = "analytics-events"

[[env.production.services]]
binding = "WORKFLOW_WORKER"
