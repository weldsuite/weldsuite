<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WeldSuite</title>
  </head>
  <body>
    <div class="titlebar" data-platform="unknown">
      <div class="titlebar__drag"></div>

      <div class="titlebar__nav">
        <button id="back" class="nav-btn" aria-label="Go back" title="Back (Alt+Left)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <button id="forward" class="nav-btn" aria-label="Go forward" title="Forward (Alt+Right)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <button id="reload" class="nav-btn" aria-label="Reload" title="Reload (Ctrl+R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3.46-7.1"/>
            <path d="M21 3v6h-6"/>
          </svg>
        </button>
      </div>

      <div class="titlebar__title">
        <svg width="14" height="14" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M30 10 h40 a20 20 0 0 1 20 20 v20 h-30 v-20 h-30 a10 10 0 0 0 0 20 h30 v30 h-40 a20 20 0 0 1 -20 -20 v-20 h30 v20 h30 a10 10 0 0 0 0 -20 h-30 z" fill="#3f72ff"/>
        </svg>
        <span id="title-text">WeldSuite</span>
      </div>
      <div class="titlebar__spacer"></div>
    </div>

    <script type="module" src="./titlebar.ts"></script>
  </body>
</html>
