<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeldSuite</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b0f;
        color: #e6e6ea;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      .shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      .logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        background: #fff;
        display: grid;
        place-items: center;
        box-shadow: 0 10px 40px rgba(63, 114, 255, 0.25);
      }
      .logo svg { width: 64px; height: 64px; }
      h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      p { font-size: 13px; color: #8a8a94; margin: 0; }
      .spinner {
        width: 18px; height: 18px;
        border: 2px solid #2a2a33;
        border-top-color: #3f72ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M30 10 h40 a20 20 0 0 1 20 20 v20 h-30 v-20 h-30 a10 10 0 0 0 0 20 h30 v30 h-40 a20 20 0 0 1 -20 -20 v-20 h30 v20 h30 a10 10 0 0 0 0 -20 h-30 z" fill="#3f72ff"/>
        </svg>
      </div>
      <h1>WeldSuite</h1>
      <p>Connecting…</p>
      <div class="spinner"></div>
    </div>
  </body>
</html>
