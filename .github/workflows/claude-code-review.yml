name: Claude Code Review

on:
  pull_request:
    # Only gate PRs that target the deployable branches (develop → test,
    # main → production). PRs between feature branches never reach prod, so
    # reviewing them just spends quota. `synchronize` MUST stay: the gate is
    # evaluated against the PR head SHA, so the commit that actually merges has
    # to be reviewed — a PASS from `opened` alone would let a later push slip a
    # bug in under a stale green check.
    branches: [develop, main]
    types: [opened, synchronize, ready_for_review, reopened]

# One in-flight review per PR. A new push cancels the prior (now-stale) run, so
# a burst of pushes only pays to review the latest commit; the superseding push
# starts its own run, so the final merged SHA is always reviewed.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Hard merge gate: this job is a REQUIRED status check on develop/main.
# It turns red (blocking merge) when Claude finds blocking issues, and fails
# closed (red) if no verdict is produced. Only correctness/security/build/
# tenant-scoping/permission regressions count as blocking; style nits do not.
jobs:
  claude-review:
    name: claude-review
    # Skip drafts — they can't be merged, so reviewing them spends quota for
    # nothing. Marking the PR "ready for review" fires `ready_for_review` and
    # runs the first real review; pushes after that re-review via `synchronize`.
    # The final, mergeable SHA is therefore always reviewed.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: '--allowedTools "Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Write,Read,Grep,Glob"'
          prompt: |
            Review pull request ${{ github.repository }}#${{ github.event.pull_request.number }}
            for correctness bugs and blocking issues using /code-review:code-review.

            This review is a HARD MERGE GATE. After reviewing you MUST record a
            machine-readable verdict by writing exactly one word to the file
            review-verdict.txt in the repository root:

            - Write `FAIL` if there are any must-fix / blocking issues:
              correctness bugs, security problems, a broken build/types,
              missing tenant scoping (workspaceId), or a permission-check
              regression. Then submit a formal review:
                gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<concise summary of the blocking issues>"

            - Otherwise write `PASS`, then submit:
                gh pr review ${{ github.event.pull_request.number }} --approve --body "<short summary>"

            Only blocking issues cause FAIL. Style nits and optional
            suggestions are non-blocking and must NOT cause FAIL. Always write
            the verdict file even if you also leave inline comments.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce review verdict
        if: always()
        run: |
          if [ ! -f review-verdict.txt ]; then
            echo "::error::Claude review produced no verdict (review-verdict.txt missing) — failing closed."
            exit 1
          fi
          verdict="$(tr -d '[:space:]' < review-verdict.txt)"
          echo "Claude review verdict: ${verdict}"
          if [ "${verdict}" = "PASS" ]; then
            exit 0
          fi
          echo "::error::Claude requested changes on this PR — resolve the blocking issues to merge."
          exit 1
