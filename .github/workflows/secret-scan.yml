name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
