name: Feature request
description: Suggest an idea or improvement for WeldSuite
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please search existing issues and discussions first. For larger features, it's worth opening a discussion before a formal request so we can align on the approach.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Who does it affect?
      placeholder: As a ..., I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Related module
      description: Which WeldSuite module does this touch?
      options:
        - WeldCRM
        - WeldDesk (helpdesk)
        - WeldMail
        - WeldFlow (projects)
        - WeldConnect (automation)
        - WeldCommerce
        - WeldBooks (accounting)
        - WeldStash (WMS)
        - WeldHost (domains)
        - WeldMeet
        - WeldChat
        - WeldAgent (AI)
        - WeldApps
        - Platform-wide / other
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false
